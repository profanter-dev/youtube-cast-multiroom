services:
  castbridge:
    build:
      context: ./castbridge
      dockerfile: Dockerfile
    container_name: castbridge
    restart: unless-stopped
    network_mode: host
    environment:
      - DEVICE_NAME=${DEVICE_NAME:-Multiroom}
    volumes:
      - ${DATA_DIR}/snapfifo:/snapfifo
      - ${DATA_DIR}/certs:/certs
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket

  snapserver:
    build:
      context: ./snapserver
      dockerfile: Dockerfile
    container_name: snapserver
    restart: unless-stopped
    depends_on:
      - castbridge
    ports:
      - "1704:1704"
      - "1705:1705"
      - "1780:1780"
    volumes:
      - ${DATA_DIR}/snapfifo:/snapfifo
    command:
      - "--stream.source"
      - "pipe:///snapfifo/snapfifo?name=YouTube&sampleformat=48000:16:2&codec=pcm"
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.snapcast.rule=Host(`${SNAPCAST_HOST}`)"
      - "traefik.http.routers.snapcast.tls=true"
      - "traefik.http.routers.snapcast.tls.certresolver=porkbun"
      - "traefik.http.routers.snapcast.entrypoints=websecure"
      - "traefik.http.services.snapcast.loadbalancer.server.port=1780"

networks:
  traefik:
    external: true
