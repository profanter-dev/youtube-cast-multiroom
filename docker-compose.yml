services:
  musicbridge:
    build:
      context: ./musicbridge
      dockerfile: Dockerfile
    container_name: musicbridge
    restart: unless-stopped
    volumes:
      - ${DATA_DIR}/snapfifo:/snapfifo
      - ${DATA_DIR}/musicbridge:/data
    environment:
      # OAuth "TVs and Limited Input devices" client for Google login (optional;
      # without it the Account page says "login not configured"). See README.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - "traefik.http.routers.music.rule=Host(`${MUSIC_HOST}`)"
      - traefik.http.routers.music.entrypoints=websecure
      - traefik.http.routers.music.tls=true
      - traefik.http.routers.music.tls.certresolver=letsencrypt
      - traefik.http.routers.music.service=music
      - traefik.http.services.music.loadbalancer.server.port=8080

  snapserver:
    build:
      context: ./snapserver
      dockerfile: Dockerfile
    container_name: snapserver
    restart: unless-stopped
    depends_on:
      - musicbridge
    ports:
      - "1704:1704"
      - "1705:1705"
      - "1780:1780"
    volumes:
      - ${DATA_DIR}/snapfifo:/snapfifo
      - ./snapserver/snapserver.conf:/etc/snapserver.conf:ro
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - "traefik.http.routers.snapcast.rule=Host(`${SNAPCAST_HOST}`)"
      - traefik.http.routers.snapcast.entrypoints=websecure
      - traefik.http.routers.snapcast.tls=true
      - traefik.http.routers.snapcast.tls.certresolver=letsencrypt
      - traefik.http.routers.snapcast.service=snapcast
      - traefik.http.services.snapcast.loadbalancer.server.port=1780

networks:
  traefik:
    external: true
