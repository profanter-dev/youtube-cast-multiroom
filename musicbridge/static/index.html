<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Multiroom</title>
<style>
  :root { --bg:#0f0f14; --card:#1b1b24; --accent:#ff4356; --txt:#f2f2f5; --dim:#9a9aa6; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); padding-bottom:150px; }
  header { position:sticky; top:0; background:var(--bg); padding:12px 14px 6px; z-index:5; }
  h1 { font-size:18px; margin:0 0 10px; }
  .tabs { display:flex; gap:8px; margin-bottom:10px; }
  .tabs button { flex:1; background:var(--card); color:var(--dim); border:0; padding:9px;
                 border-radius:10px; font-size:14px; }
  .tabs button.active { color:var(--txt); background:var(--accent); }
  #search { width:100%; padding:11px 14px; border-radius:12px; border:0; font-size:15px;
            background:var(--card); color:var(--txt); }
  .list { padding:6px 10px; }
  .row { display:flex; align-items:center; gap:10px; padding:8px; border-radius:10px; }
  .row:active { background:var(--card); }
  .row img { width:46px; height:46px; border-radius:6px; object-fit:cover; background:var(--card); flex:0 0 auto; }
  .meta { flex:1; min-width:0; }
  .meta .t { font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta .a { font-size:12px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .q { background:none; border:0; color:var(--dim); font-size:22px; padding:4px 8px; }
  .hint { color:var(--dim); font-size:13px; padding:18px 14px; text-align:center; }
  .bar { display:flex; gap:8px; padding:4px 12px 8px; }
  .bar button { flex:1; background:var(--card); color:var(--txt); border:0; padding:10px;
                border-radius:10px; font-size:14px; }
  .bar button.ghost { background:none; color:var(--dim); flex:0 0 auto; }
  #player { position:fixed; left:0; right:0; bottom:0; background:var(--card);
            padding:10px 14px calc(10px + env(safe-area-inset-bottom)); display:none; }
  #player.show { display:block; }
  .np { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .np img { width:42px; height:42px; border-radius:6px; object-fit:cover; }
  .prog { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .prog .time { font-size:11px; color:var(--dim); width:34px; text-align:center; flex:0 0 auto; }
  .track { flex:1; height:4px; border-radius:2px; background:#33333f; overflow:hidden; }
  .track > i { display:block; height:100%; width:0; background:var(--accent); }
  .ctrls { display:flex; justify-content:center; align-items:center; gap:14px; }
  .ctrls button { background:none; border:0; color:var(--txt); font-size:24px; padding:2px; }
  .ctrls .play { background:var(--accent); width:50px; height:50px; border-radius:50%; font-size:22px; }
  .ctrls .toggle { font-size:18px; color:var(--dim); }
  .ctrls .toggle.on { color:var(--accent); }
  .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .top h1 { margin:0; }
  .acct { background:var(--card); color:var(--dim); border:0; border-radius:8px; padding:6px 12px; font-size:13px; }
  .acct.ok { color:#4ade80; }
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none;
           align-items:center; justify-content:center; z-index:20; padding:20px; }
  .modal.show { display:flex; }
  .sheet { background:var(--card); border-radius:14px; padding:20px; max-width:360px; width:100%; }
  .sheet h2 { margin:0 0 10px; font-size:17px; }
  .sheet p { color:var(--dim); font-size:13px; line-height:1.5; margin:8px 0; }
  .sheet b { color:var(--txt); }
  .code { font-size:30px; letter-spacing:4px; text-align:center; font-weight:700;
          background:var(--bg); padding:14px; border-radius:10px; margin:12px 0; }
  .sheet a.btn, .sheet button.btn { display:block; width:100%; text-align:center; box-sizing:border-box;
        background:var(--accent); color:#fff; border:0; border-radius:10px; padding:12px;
        font-size:15px; text-decoration:none; margin-top:8px; }
  .sheet button.sec { background:none; color:var(--dim); }
</style>
</head>
<body>
<header>
  <div class="top"><h1>🎵 Multiroom</h1><button id="account" class="acct">Account</button></div>
  <div class="tabs">
    <button data-tab="search" class="active">Search</button>
    <button data-tab="library">Library</button>
    <button data-tab="playlists">Playlists</button>
    <button data-tab="queue">Queue</button>
  </div>
  <input id="search" placeholder="Search YouTube Music…" autocomplete="off" />
</header>

<div id="actionbar" class="bar" style="display:none"></div>
<div id="list" class="list"></div>

<div id="player">
  <div class="np">
    <img id="np-img" src="" alt="" />
    <div class="meta"><div class="t" id="np-title">—</div><div class="a" id="np-artist"></div></div>
  </div>
  <div class="prog">
    <span class="time" id="t-cur">0:00</span>
    <div class="track"><i id="t-fill"></i></div>
    <span class="time" id="t-dur">0:00</span>
  </div>
  <div class="ctrls">
    <button id="shuffle" class="toggle" title="Shuffle">🔀</button>
    <button id="prev">⏮</button>
    <button id="playpause" class="play">⏸</button>
    <button id="next">⏭</button>
    <button id="repeat" class="toggle" title="Repeat">🔁</button>
    <button id="stop">⏹</button>
  </div>
</div>

<div id="authModal" class="modal"><div class="sheet" id="authSheet"></div></div>

<script>
const $ = s => document.querySelector(s);
const listEl = $("#list");
const actionEl = $("#actionbar");
let tab = "search";
let lastTracks = [];   // tracks currently shown (for "Play all" / "Shuffle play")

async function api(path, opts) {
  const r = await fetch("/api/" + path, opts);
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || r.status);
  return r.json();
}
const post = (path, body) => api(path, {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: body ? JSON.stringify(body) : null,
});
const esc = s => (s || "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const fmt = s => { s = Math.max(0, s|0); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); };
function flash(b){ b.textContent="✓"; setTimeout(()=>b.textContent="＋",700); }

function showActions(buttons) {
  if (!buttons) { actionEl.style.display = "none"; actionEl.innerHTML = ""; return; }
  actionEl.style.display = "flex";
  actionEl.innerHTML = "";
  buttons.forEach(b => {
    const el = document.createElement("button");
    el.textContent = b.label;
    if (b.ghost) el.className = "ghost";
    el.onclick = b.onclick;
    actionEl.appendChild(el);
  });
}

function render(tracks, emptyMsg) {
  lastTracks = tracks;
  if (!tracks.length) { listEl.innerHTML = `<div class="hint">${emptyMsg}</div>`; return; }
  listEl.innerHTML = "";
  tracks.forEach(t => {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <img src="${t.thumb || ""}" />
      <div class="meta"><div class="t">${esc(t.title)}</div><div class="a">${esc(t.artist || "")}</div></div>
      <button class="q">＋</button>`;
    row.querySelector("img").onclick = row.querySelector(".meta").onclick = () => post("play", t);
    row.querySelector(".q").onclick = e => { e.stopPropagation(); post("queue", t); flash(e.target); };
    listEl.appendChild(row);
  });
}

// Buttons that play an entire shown list (playlist / library / search results).
function listPlayActions(tracks) {
  return [
    { label: "▶ Play all", onclick: () => post("play_tracks", { tracks, shuffle: false }) },
    { label: "🔀 Shuffle play", onclick: () => post("play_tracks", { tracks, shuffle: true }) },
  ];
}

// --- tabs ---
document.querySelectorAll(".tabs button").forEach(b => b.onclick = () => {
  document.querySelectorAll(".tabs button").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  tab = b.dataset.tab;
  $("#search").style.display = tab === "search" ? "block" : "none";
  loadTab();
});

async function loadTab() {
  showActions(null);
  listEl.innerHTML = `<div class="hint">Loading…</div>`;
  try {
    if (tab === "library") {
      const songs = await api("library");
      render(songs, "Library is empty or needs account auth.");
      if (songs.length) showActions(listPlayActions(songs));
    } else if (tab === "playlists") {
      renderPlaylists(await api("playlists"));
    } else if (tab === "queue") {
      renderQueue(await api("status"));
    } else {
      listEl.innerHTML = `<div class="hint">Search your YouTube Music above.</div>`;
    }
  } catch (e) { listEl.innerHTML = `<div class="hint">${esc(e.message)}</div>`; }
}

function renderPlaylists(pls) {
  if (!pls.length) { listEl.innerHTML = `<div class="hint">No playlists (needs account auth).</div>`; return; }
  listEl.innerHTML = "";
  pls.forEach(p => {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `<img src="${p.thumb || ""}" /><div class="meta"><div class="t">${esc(p.title)}</div></div>`;
    row.onclick = async () => {
      showActions(null);
      listEl.innerHTML = `<div class="hint">Loading…</div>`;
      const data = await api("playlist/" + p.playlistId);
      render(data.tracks, "Empty playlist.");
      if (data.tracks.length) {
        showActions([
          ...listPlayActions(data.tracks),
          { label: "↩", ghost: true, onclick: () => loadTab() },
        ]);
      }
    };
    listEl.appendChild(row);
  });
}

function renderQueue(s) {
  showActions(null);
  const items = s.queue || [];
  if (!items.length) { listEl.innerHTML = `<div class="hint">Queue is empty. Tap ＋ on a track, or “Play all” a playlist.</div>`; return; }
  showActions([{ label: "🗑 Clear queue", onclick: async () => renderQueue(await post("queue/clear")) }]);
  listEl.innerHTML = "";
  items.forEach((t, i) => {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <img src="${t.thumb || ""}" />
      <div class="meta"><div class="t">${esc(t.title)}</div><div class="a">${esc(t.artist || "")}</div></div>
      <button class="q">✕</button>`;
    row.querySelector(".q").onclick = async () => renderQueue(await post("queue/remove", { index: i }));
    listEl.appendChild(row);
  });
}

// --- search (debounced) ---
let timer;
$("#search").addEventListener("input", e => {
  clearTimeout(timer);
  const q = e.target.value.trim();
  showActions(null);
  if (!q) { listEl.innerHTML = `<div class="hint">Search your YouTube Music above.</div>`; return; }
  timer = setTimeout(async () => {
    try {
      const songs = await api("search?q=" + encodeURIComponent(q));
      render(songs, "No results.");
      if (songs.length) showActions(listPlayActions(songs));
    } catch (err) { listEl.innerHTML = `<div class="hint">${esc(err.message)}</div>`; }
  }, 350);
});

// --- transport ---
$("#prev").onclick = () => post("prev");
$("#next").onclick = () => post("next");
$("#stop").onclick = () => post("stop");
$("#playpause").onclick = () => post(paused ? "resume" : "pause");
$("#shuffle").onclick = () => post("shuffle", { on: !shuffle });
$("#repeat").onclick = () => {
  const next = { off: "all", all: "one", one: "off" }[repeat] || "off";
  post("repeat", { mode: next });
};

let paused = false, shuffle = false, repeat = "off";
async function poll() {
  try {
    const s = await api("status");
    const p = $("#player");
    shuffle = s.shuffle; repeat = s.repeat;
    $("#shuffle").classList.toggle("on", shuffle);
    const rb = $("#repeat");
    rb.classList.toggle("on", repeat !== "off");
    rb.textContent = repeat === "one" ? "🔂" : "🔁";
    if (s.current) {
      p.classList.add("show");
      $("#np-title").textContent = s.current.title;
      $("#np-artist").textContent = s.current.artist || "";
      $("#np-img").src = s.current.thumb || "";
      paused = s.paused;
      $("#playpause").textContent = paused ? "▶" : "⏸";
      const dur = s.current.duration || 0, cur = s.elapsed || 0;
      $("#t-cur").textContent = fmt(cur);
      $("#t-dur").textContent = dur ? fmt(dur) : "–:––";
      $("#t-fill").style.width = dur ? Math.min(100, cur / dur * 100) + "%" : "0%";
    } else {
      p.classList.remove("show");
    }
    if (tab === "queue") renderQueue(s);   // keep the queue view live
  } catch (e) {}
  setTimeout(poll, 2000);
}
// --- account / Google login (OAuth device flow) ---
const authBtn = $("#account"), authModal = $("#authModal"), authSheet = $("#authSheet");
let authMethod = "none", authConfigured = false, pollTimer = null;

async function refreshAuth() {
  try {
    const s = await api("auth/status");
    authMethod = s.method; authConfigured = s.configured;
    authBtn.textContent = authMethod === "none" ? "Connect" : "Account";
    authBtn.classList.toggle("ok", authMethod !== "none");
  } catch (e) {}
}

function closeAuth() {
  authModal.classList.remove("show");
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}
function bindClose() { const c = $("#closeAuth"); if (c) c.onclick = closeAuth; }
authBtn.onclick = () => { renderAuth(); authModal.classList.add("show"); };
authModal.onclick = e => { if (e.target === authModal) closeAuth(); };

function renderAuth() {
  if (authMethod === "oauth") {
    authSheet.innerHTML = `<h2>Account connected</h2>
      <p>Signed in with your Google account. Library &amp; playlists use this token, which refreshes itself.</p>
      <button class="btn" id="logout">Disconnect</button>
      <button class="btn sec" id="closeAuth">Close</button>`;
    $("#logout").onclick = async () => { await post("auth/logout"); await refreshAuth(); renderAuth(); loadTab(); };
  } else if (!authConfigured) {
    authSheet.innerHTML = `<h2>Login not configured</h2>
      <p>Set <b>GOOGLE_CLIENT_ID</b> and <b>GOOGLE_CLIENT_SECRET</b> (a “TVs and Limited Input
      devices” OAuth client) in the server environment and restart.
      ${authMethod === "browser" ? "A browser.json is currently in use." : ""}</p>
      <button class="btn sec" id="closeAuth">Close</button>`;
  } else {
    authSheet.innerHTML = `<h2>Connect Google account</h2>
      <p>Log in once with your real Google account. The token refreshes itself, so you won’t have to redo this.</p>
      <button class="btn" id="startAuth">Start login</button>
      <button class="btn sec" id="closeAuth">Close</button>`;
    $("#startAuth").onclick = startAuth;
  }
  bindClose();
}

async function startAuth() {
  authSheet.innerHTML = `<p>Starting…</p>`;
  let d;
  try { d = await post("auth/start"); }
  catch (e) {
    authSheet.innerHTML = `<h2>Couldn’t start</h2><p>${esc(e.message)}</p>
      <button class="btn sec" id="closeAuth">Close</button>`;
    bindClose(); return;
  }
  const host = (d.verification_url || "").replace(/^https?:\/\//, "");
  authSheet.innerHTML = `<h2>Sign in to Google</h2>
    <p>Open the link below and enter this code:</p>
    <div class="code">${esc(d.user_code || "")}</div>
    <a class="btn" href="${esc(d.verification_url)}" target="_blank" rel="noopener">Open ${esc(host)}</a>
    <p id="authState">Waiting for approval…</p>
    <button class="btn sec" id="closeAuth">Close</button>`;
  bindClose();
  const interval = Math.max(2, d.interval || 5) * 1000;
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    let r;
    try { r = await post("auth/poll"); } catch (e) { return; }
    const st = $("#authState");
    if (r.status === "connected") {
      clearInterval(pollTimer); pollTimer = null;
      if (st) st.textContent = "Connected! 🎉";
      await refreshAuth();
      setTimeout(() => { closeAuth(); loadTab(); }, 1200);
    } else if (r.status === "error") {
      clearInterval(pollTimer); pollTimer = null;
      if (st) st.textContent = "Error: " + (r.error || "unknown");
    }
  }, interval);
}

refreshAuth();
poll();
loadTab();
</script>
</body>
</html>
